# ===== Настройки ===== #

monitor = DVI-D-1, 1920x1080@75.00Hz, 0x0, 1
#monitor = DVI-D-1, 1280x1024@75.03Hz, 0x0, 1

$opacity = 0.8
$blur = yes
general:allow_tearing = false

input {
    kb_layout = us, ru
    kb_options = grp:ctrl_shift_toggle, caps:none
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    force_no_accel = true
}

# ===== Автозагрузка ===== #

exec-once = waybar -c ~/.config/hypr/waybar/waybar.jsonc -s ~/.config/hypr/waybar/waybar.css
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --type text --watch cliphist store
exec-once = mako
exec-once = swaybg -i ~/.config/hypr/img.png
exec-once = hyprctl setcursor capitaine-cursors 24
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11,*
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# ===== Окна ===== #

general {
    gaps_in = 3
    gaps_out = 6
    border_size = 1
    col.active_border = rgba(200,200,200,0.4)
    col.inactive_border = rgba(200,200,200,0.4)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    shadow:enabled = false
    active_opacity = $opacity
    inactive_opacity = $opacity
}

decoration:blur {
    enabled = $blur
    size = 8
    passes = 1
    ignore_opacity = true
    new_optimizations = true
    xray = false
	popups = true
}

dwindle:preserve_split = true
cursor:no_warps = true

# ===== Анимации ===== #

animations {
    enabled = true
	bezier = w1, 0.23, 1, 0.32, 1
    bezier = w2, 0.05, 0.7, 0.1, 1
	bezier = f1, 0.15, 0, 0.1, 1
    bezier = ws1, 0.1, 1, 0, 1

	animation = windows, 1, 4, w1, popin 70%
	animation = windowsMove, 1, 3, w2, slide
    animation = fade, 1, 2, f1
    animation = workspaces, 1, 6, ws1, slide
}

# ===== misc ===== #

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ===== Бинды ===== #

bind = super, 1, workspace, 1
bind = super, 2, workspace, 2
bind = super, 3, workspace, 3
bind = super, 4, workspace, 4
bind = super, 5, workspace, 5
bind = alt, 1, movetoworkspace, 1
bind = alt, 2, movetoworkspace, 2
bind = alt, 3, movetoworkspace, 3
bind = alt, 4, movetoworkspace, 4
bind = alt, 5, movetoworkspace, 5
bind = super, mouse_down, workspace, -1
bind = super, mouse_up, workspace, +1
bindm = super, mouse:272, movewindow
bindm = super, mouse:273, resizewindow
bind = super, d, fullscreen, 1
bind = super, f, fullscreen, 0
bind = super, a, togglefloating
bind = super, c, killactive
bind = super+shift, m, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = super, m, exec, pgrep -x "waybar" > /dev/null && killall waybar || waybar -c ~/.config/hypr/waybar/waybar.jsonc -s ~/.config/hypr/waybar/waybar.css
bind = alt, tab, exec, ~/.config/hypr/move.sh next
bind = alt, q, exec, ~/.config/hypr/move.sh prev

bind = super, return, exec, alacritty
bind = super, e, exec, thunar
bind = super, tab, exec, rofi -show drun -config ~/.config/hypr/rofi/config.rasi
bind = super, x, exec, cliphist list | rofi -dmenu -theme ~/.config/hypr/rofi/themes/cliphist.rasi -display-columns 2 | cliphist decode | wl-copy
bind = super, z, exec, ~/.config/hypr/rofi/scripts/search.sh
bind = super, q, exec, ~/.config/hypr/rofi/scripts/sites.sh
bind = alt, escape, exec, ~/.config/hypr/rofi/scripts/vpn.sh
bind = super, escape, exec, ~/.config/hypr/rofi/scripts/audio.sh
bind = ctrl+alt, delete, exec, ~/.config/hypr/rofi/scripts/power.sh
bind = super, s, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Box/screen/$(date +%T).png
bind = super+shift, s, exec, grim - | wl-copy && wl-paste > ~/Box/screen/$(date +%T).png
bind = super, p, exec, hyprpicker -a

# ===== Правила окон ===== #

windowrule = match:title ^(Переименовать)(.*)$, float on, size 400 200
windowrule = match:title ^(Новый файл)(.*)$, float on, size 400 200, move 760 440
windowrule = match:title ^(Создать новый каталог)(.*)$, float on, size 400 200, move 760 440
windowrule = match:title ^(Очистить корзину)(.*)$, center on
windowrule = match:title ^(Внимание)(.*)$, center on
windowrule = match:title ^(Действия над файлами)(.*)$, float on
windowrule = match:title ^(Сжать)$, float on, size 672 171, move 624 454
windowrule = match:title ^(Распаковать архив)$, float on, size 672 171, move 624 454
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on, size 630 400, move 800 620
windowrule = match:class ^(mpv)$, float on, size 1280 720, xray 1
windowrule = match:class ^(imv)$, float on, size 1280 720, xray 1
windowrule = match:class ^(org.telegram.desktop)$, float on, size 1280 720
windowrule = match:class ^(io.missioncenter.MissionCenter)$, float on, size 1280 720

windowrule = match:class ^(firefox)$, workspace 1
windowrule = match:class ^(steam)$, workspace 3
