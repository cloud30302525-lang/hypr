# ===== Настройки ===== #

monitor = DP-1, 1920x1080@75, 0x0, 1

input {
    kb_layout = us, ru
    kb_options = grp:ctrl_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    force_no_accel = false
}

# ===== Автозагрузка ===== #

exec-once = waybar -c ~/.config/hypr/waybar/waybar.jsonc -s ~/.config/hypr/waybar/waybar.css
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --type text --watch cliphist store
exec-once = mako
exec-once = swaybg -i ~/.config/hypr/img.png
exec-once = hyprctl setcursor capitaine-cursors 24

# ===== Окна ===== #

general {
	allow_tearing = false
    gaps_in = 3
    gaps_out = 6
    border_size = 1
    col.active_border = rgba(255,255,255,0.5)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    shadow {
        enabled = false
    }
    blur {
        enabled = true
        size = 12
        passes = 4
        new_optimizations = true
        xray = true
        ignore_opacity = false
    }
		active_opacity = 0.9
		inactive_opacity = 0.9
}

dwindle {
    preserve_split = true
    force_split = 0
}

cursor {
    no_warps = true
}

# ===== Анимации ===== #

animations {
    enabled = true
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# ===== Бинды ===== #

bind = super, 1, workspace, 1
bind = super, 2, workspace, 2
bind = super, 3, workspace, 3
bind = super, 4, workspace, 4
bind = super, 5, workspace, 5
bind = alt, 1, movetoworkspace, 1
bind = alt, 2, movetoworkspace, 2
bind = alt, 3, movetoworkspace, 3
bind = alt, 4, movetoworkspace, 4
bind = alt, 5, movetoworkspace, 5
bind = super, mouse_down, workspace, -1
bind = super, mouse_up, workspace, +1
bindm = super, mouse:272, movewindow
bindm = super, mouse:273, resizewindow
bind = super, d, fullscreen, 1
bind = super, f, fullscreen, 0
bind = super, v, togglefloating
bind = super, c, killactive
bind = super+shift, m, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = super, m, exec, pgrep -x "waybar" > /dev/null && killall waybar || waybar -c ~/.config/hypr/waybar/waybar.jsonc -s ~/.config/hypr/waybar/waybar.css
bind = super, n, exec, pgrep -x "waybar" > /dev/null && killall waybar || waybar -c ~/.config/hypr/waybar/waybar.jsonc -s ~/.config/hypr/waybar/waybar1.css

bind = super, return, exec, alacritty
bind = super, q, exec, firefox
bind = super, e, exec, thunar
bind = super, tab, exec, rofi -show drun
bind = super, x, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/cliphist.rasi -display-columns 2 | cliphist decode | wl-copy
bind = super, s, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/$(date +%T).png
bind = super+shift, s, exec, grim - | wl-copy && wl-paste > ~/Pictures/$(date +%T).png
bind = super, p, exec, hyprpicker -a

# ===== Правила окон ===== #

windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on, size 630 400, move 900 630
windowrule = match:class ^(com.github.rafostar.Clapper)$, float on, size 1200 800, center on
